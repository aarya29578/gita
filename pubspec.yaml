name: vitagita
description: VitaGita Flutter app scaffold with Firebase integration.
publish_to: 'none'
version: 0.0.1
environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1

  provider: ^6.0.5
  url_launcher: ^6.1.10
  video_player: ^2.8.5
  share_plus: ^7.0.0
  path_provider: ^2.1.3
  screenshot: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/splash/
    - assets/json/

# Configure app launcher icons
flutter_launcher_icons:
  android: true
  ios: true
  # Use the provided app logo image
  image_path: assets/splash/icon.logo.jpeg
  min_sdk_android: 21
  remove_alpha_ios: true
